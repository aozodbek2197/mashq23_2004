<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        .filters button {margin:5px;}
        .projects {display:grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap:15px;}
        .project {border:1px solid #ddd; padding:15px;}
    </style>
</head>
<body>
    <h1>Loyihalar</h1>
    <div class="filters">
        <button onclick="filter('all')">Barchasi</button>
        <button onclick="filter('web')">Web</button>
        <button onclick="filter('mobile')">Mobile</button>
    </div>
    <div class="projects" id="projects">
        <div class="project" data-category="web">Web Sayt 1</div>
        <div class="project" data-category="mobile">Mobile App</div>
    </div>

    <script>
        function filter(cat) {
            document.querySelectorAll('.project').forEach(p => {
                p.style.display = (cat === 'all' || p.dataset.category === cat) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
